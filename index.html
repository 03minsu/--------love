<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#07051a;color:#e4dcf8;font-family:'Gowun Batang',serif;min-height:100vh}

canvas#stars-bg{position:fixed;inset:0;z-index:0;pointer-events:none}
section{position:relative;z-index:1}

</style>

<body>

<canvas id="stars-bg"></canvas>
<script>
(function(){
const cv=document.getElementById('stars-bg'),cx=cv.getContext('2d');
let W,H,st=[];
function rs(){W=cv.width=window.innerWidth;H=cv.height=Math.max(document.body.scrollHeight,window.innerHeight);st=Array.from({length:200},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.2,s:Math.random()*.006+.002}))}
function dr(){cx.clearRect(0,0,W,H);st.forEach(s=>{const o=.2+.7*(.5+.5*Math.sin(Date.now()*s.s));cx.beginPath();cx.arc(s.x,s.y,s.r,0,6.28);cx.fillStyle='rgba(200,175,255,'+o+')';cx.fill()});requestAnimationFrame(dr)}
window.addEventListener('resize',rs);rs();dr();
})();
</script>
